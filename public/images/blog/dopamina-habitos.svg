<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="dusk" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#3b2b2a"/>
      <stop offset="60%" stop-color="#6b3f20"/>
      <stop offset="100%" stop-color="#d08a2d"/>
    </linearGradient>
    <filter id="grain">
      <feTurbulence baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" result="turb" />
      <feColorMatrix type="saturate" values="0" />
      <feBlend in="SourceGraphic" mode="overlay"/>
      <feComposite in2="turb" operator="in" result="grain" />
      <feBlend in="SourceGraphic" in2="grain" mode="multiply"/>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fondo crepuscular -->
  <rect width="100%" height="100%" fill="url(#dusk)" />

  <!-- Sutil grano sobre el fondo -->
  <rect width="100%" height="100%" fill="#000" opacity="0.03" filter="url(#grain)" />

  <!-- Marquee (cartelera) -->
  <g transform="translate(120,220)">
    <rect x="0" y="0" rx="28" ry="28" width="1360" height="360" fill="#111" opacity="0.95" stroke="#2b1a14" stroke-width="6" />

    <!-- Luces alrededor del marco -->
    <g fill="#ffd28a" filter="url(#softGlow)">
      <!-- top bulbs -->
      <g>
        <!-- draw bulbs as circles spaced -->
        <!-- using a loop would be simpler in code; here explicit positions -->
        <circle cx="40" cy="20" r="14"/>
        <circle cx="120" cy="20" r="14"/>
        <circle cx="200" cy="20" r="14"/>
        <circle cx="280" cy="20" r="14"/>
        <circle cx="360" cy="20" r="14"/>
        <circle cx="440" cy="20" r="14"/>
        <circle cx="520" cy="20" r="14"/>
        <circle cx="600" cy="20" r="14"/>
        <circle cx="680" cy="20" r="14"/>
        <circle cx="760" cy="20" r="14"/>
        <circle cx="840" cy="20" r="14"/>
        <circle cx="920" cy="20" r="14"/>
        <circle cx="1000" cy="20" r="14"/>
        <circle cx="1080" cy="20" r="14"/>
        <circle cx="1160" cy="20" r="14"/>
        <circle cx="1240" cy="20" r="14"/>
        <circle cx="1320" cy="20" r="14"/>
      </g>

      <!-- bottom bulbs -->
      <g transform="translate(0,320)">
        <circle cx="40" cy="0" r="14"/>
        <circle cx="120" cy="0" r="14"/>
        <circle cx="200" cy="0" r="14"/>
        <circle cx="280" cy="0" r="14"/>
        <circle cx="360" cy="0" r="14"/>
        <circle cx="440" cy="0" r="14"/>
        <circle cx="520" cy="0" r="14"/>
        <circle cx="600" cy="0" r="14"/>
        <circle cx="680" cy="0" r="14"/>
        <circle cx="760" cy="0" r="14"/>
        <circle cx="840" cy="0" r="14"/>
        <circle cx="920" cy="0" r="14"/>
        <circle cx="1000" cy="0" r="14"/>
        <circle cx="1080" cy="0" r="14"/>
        <circle cx="1160" cy="0" r="14"/>
        <circle cx="1240" cy="0" r="14"/>
        <circle cx="1320" cy="0" r="14"/>
      </g>
    </g>

    <!-- Texto sugerente (sin texto real según indicación) -->
    <g transform="translate(60,110)">
      <rect x="0" y="0" width="1240" height="140" rx="6" ry="6" fill="#1a1a1a" opacity="0.9" />
      <!-- subtle glowing stripe -->
      <rect x="10" y="10" width="1220" height="40" fill="#3b1f0f" opacity="0.6"/>
      <!-- placeholder lines to simulate marquee letters without text overlay -->
      <g fill="#f6c77a" opacity="0.95">
        <rect x="60" y="26" width="110" height="18" rx="4"/>
        <rect x="190" y="26" width="240" height="18" rx="4"/>
        <rect x="460" y="26" width="260" height="18" rx="4"/>
        <rect x="740" y="26" width="160" height="18" rx="4"/>
        <rect x="920" y="26" width="200" height="18" rx="4"/>
      </g>
    </g>

    <!-- Ground reflection / soft vignette -->
    <ellipse cx="680" cy="420" rx="760" ry="120" fill="#000" opacity="0.18" />
  </g>

  <!-- Foreground cinematic depth: subtle vignette -->
  <radialGradient id="vign" cx="50%" cy="50%" r="60%">
    <stop offset="60%" stop-color="#000" stop-opacity="0" />
    <stop offset="100%" stop-color="#000" stop-opacity="0.45" />
  </radialGradient>
  <rect width="100%" height="100%" fill="url(#vign)" />
</svg>
